# ─────────────────────────────────────────────
# a2a — USER CONFIGURATION
# Edit this file to control the entire pipeline.
# ─────────────────────────────────────────────

# ── Gemini AI Settings ────────────────────────
# Free-tier limits (as of 2026-04):
#   gemini-3.1-flash-lite-preview — 15 RPM, 250K TPM, 500 RPD  ← best free option
#   gemini-2.5-flash-lite         — 10 RPM, 250K TPM,  20 RPD  ← too low for production
ai:
    model: "gemini-3.1-flash-lite-preview"
    max_tokens: 8192
    temperature: 0

# ── Scraping Settings ─────────────────────────
scraping:
    headless: true
    request_delay_ms: 1000
    # Set to 50+ for production runs; keep at 10 for faster testing.
    max_listings_per_site: 50
    max_retries: 3
    proxies: []

# ── Websites to Scrape ────────────────────────
websites:
    - name: "Kijiji"
      enabled: true # working
      base_url: "https://www.kijiji.ca"
      url_builder: "kijiji"
      strategy: "crawlee"

    - name: "Craigslist Toronto"
      enabled: true
      base_url: "https://toronto.craigslist.org"
      url_builder: "craigslist"
      strategy: "crawlee"

    - name: "Rentals.ca"
      enabled: true # working
      base_url: "https://rentals.ca"
      url_builder: "rentals_ca"
      strategy: "crawlee"

    - name: "Airbnb (Monthly Stays)"
      enabled: true
      base_url: "https://www.airbnb.ca"
      url_builder: "airbnb"
      strategy: "zendriver"

    - name: "Facebook Marketplace"
      enabled: false # requires manually exporting session cookies from a logged-in browser
      base_url: "https://www.facebook.com"
      url_builder: "facebook_marketplace"
      strategy: "camoufox"
      cookies: []

# ─────────────────────────────────────────────
# SEARCH PARAMETERS
# Fill out this section with your rental requirements.
# These values are injected into every site's search URL.
# ─────────────────────────────────────────────

search:
    # Location
    city: "Toronto"
    # Scrapers search city-wide then filter by radius around anchor_address.
    # neighborhood is only used for preference scoring, not URL filtering.
    neighborhood: "Yorkville"
    anchor_address: "27 King's College Circle, Toronto, ON"
    max_distance_km: 4 # radius in km around anchor_address used for both scraping and hard filter

    # Dates
    move_in_date: "2026-09-01" # e.g. "2026-09-01"
    lease_duration_months: 8 # e.g. 8

    # Unit Type
    min_bedrooms: 2 # e.g. 1
    max_bedrooms: 2 # e.g. 2
    min_bathrooms: 1 # e.g. 1
    unit_types: ["apartment", "condo"] # e.g. ["apartment", "condo", "basement", "house"]

    # Budget
    max_monthly_rent: 3000 # e.g. 2200 (CAD)
    min_monthly_rent: 2000 # e.g. 800

    # Size
    min_sqft: null # e.g. 400

# ─────────────────────────────────────────────
# HARD REQUIREMENTS
# Listings that fail ANY of these are dropped entirely.
# Set to null to disable a requirement.
# ─────────────────────────────────────────────

requirements:
    max_monthly_rent: 3200
    min_bedrooms: 2
    max_distance_km: 4
    must_be_furnished: true
    must_allow_pets: null
    must_have_laundry: true
    must_have_parking: null
    short_term_ok: true
    # Drop listings outside these neighborhoods (case-insensitive, substring match).
    # Leave empty [] to allow all neighborhoods (recommended — use max_distance_km instead).
    # AI-extracted neighborhood names are unreliable so this filter can be aggressive.
    allowed_neighborhoods: []

# ─────────────────────────────────────────────
# PREFERENCES (Weighted Scoring)
# ─────────────────────────────────────────────

preferences:
    - name: "Yorkville neighbourhood"
      enabled: true
      weight: 10
      description: "Prefer listings in Yorkville specifically"
      type: "neighborhood_match"
      values: ["Yorkville", "Bloor-Yorkville"]

    - name: "Close to UofT"
      enabled: true
      weight: 9
      description: "Prefer listings closer to anchor_address"
      type: "distance"

    - name: "Lower rent"
      enabled: false
      weight: 7
      description: "Prefer listings with lower monthly rent"
      type: "price_asc"

    - name: "Furnished"
      enabled: true
      weight: 8
      description: "Prefer furnished units"
      type: "boolean_field"
      field: "furnished"

    - name: "In-unit laundry"
      enabled: true
      weight: 10
      description: "Prefer in-unit washer/dryer"
      type: "boolean_field"
      field: "laundry_in_unit"

    - name: "Utilities included"
      enabled: true
      weight: 4
      description: "Prefer rent that includes heat/hydro/water"
      type: "boolean_field"
      field: "utilities_included"

    - name: "Parking included"
      enabled: false
      weight: 1
      description: "Prefer listings with parking"
      type: "boolean_field"
      field: "parking_included"

    - name: "Pets allowed"
      enabled: false
      weight: 1
      description: "Prefer pet-friendly listings"
      type: "boolean_field"
      field: "pets_allowed"

    - name: "Balcony or outdoor space"
      enabled: true
      weight: 6
      description: "Prefer units with a balcony, terrace, or yard"
      type: "boolean_field"
      field: "outdoor_space"

    - name: "Gym / fitness center"
      enabled: true
      weight: 8
      description: "Prefer buildings with a gym"
      type: "boolean_field"
      field: "gym"

# ── Output Settings ───────────────────────────
output:
    directory: "./output"
    formats:
        - "html"
        - "json"
        - "csv"
    open_html_on_complete: true
