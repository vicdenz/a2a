# ─────────────────────────────────────────────
# APARTMENT FINDER — USER CONFIGURATION
# Edit this file to control the entire pipeline.
# ─────────────────────────────────────────────

# ── Claude AI Settings ────────────────────────
ai:
  model: "claude-sonnet-4-6"
  max_tokens: 4096
  temperature: 0

# ── Scraping Settings ─────────────────────────
scraping:
  headless: true
  request_delay_ms: 2000
  max_listings_per_site: 50
  max_retries: 3
  proxies: []

# ── Websites to Scrape ────────────────────────
websites:
  - name: "Kijiji"
    enabled: true
    base_url: "https://www.kijiji.ca"
    url_builder: "kijiji"
    strategy: "crawlee"

  - name: "Craigslist Toronto"
    enabled: true
    base_url: "https://toronto.craigslist.org"
    url_builder: "craigslist"
    strategy: "crawlee"

  - name: "Rentals.ca"
    enabled: true
    base_url: "https://rentals.ca"
    url_builder: "rentals_ca"
    strategy: "crawlee"

  - name: "PadMapper"
    enabled: true
    base_url: "https://www.padmapper.com"
    url_builder: "padmapper"
    strategy: "camoufox"

  - name: "Apartments.com"
    enabled: true
    base_url: "https://www.apartments.com"
    url_builder: "apartments_com"
    strategy: "camoufox"

  - name: "Zillow"
    enabled: true
    base_url: "https://www.zillow.com"
    url_builder: "zillow"
    strategy: "camoufox"

  - name: "Airbnb (Monthly Stays)"
    enabled: true
    base_url: "https://www.airbnb.ca"
    url_builder: "airbnb"
    strategy: "zendriver"

  - name: "UofT Off-Campus Housing"
    enabled: true
    base_url: "https://housing.utoronto.ca"
    url_builder: "uoft_housing"
    strategy: "crawlee"

  - name: "Facebook Marketplace"
    enabled: false
    base_url: "https://www.facebook.com"
    url_builder: "facebook_marketplace"
    strategy: "camoufox"
    cookies: []

# ─────────────────────────────────────────────
# SEARCH PARAMETERS
# Fill out this section with your rental requirements.
# These values are injected into every site's search URL.
# ─────────────────────────────────────────────

search:
  # Location
  city: ""                           # e.g. "Toronto"
  neighborhood: ""                   # e.g. "Annex, Kensington, Little Portugal"
  anchor_address: ""                 # e.g. "27 King's College Circle, Toronto, ON"
  max_distance_km: null              # e.g. 3

  # Dates
  move_in_date: ""                   # e.g. "2026-09-01"
  lease_duration_months: null        # e.g. 8

  # Unit Type
  min_bedrooms: null                 # e.g. 1
  max_bedrooms: null                 # e.g. 2
  min_bathrooms: null                # e.g. 1
  unit_types: []                     # e.g. ["apartment", "condo", "basement", "house"]

  # Budget
  max_monthly_rent: null             # e.g. 2200 (CAD)
  min_monthly_rent: null             # e.g. 800

  # Size
  min_sqft: null                     # e.g. 400

# ─────────────────────────────────────────────
# HARD REQUIREMENTS
# Listings that fail ANY of these are dropped entirely.
# Set to null to disable a requirement.
# ─────────────────────────────────────────────

requirements:
  max_monthly_rent: null
  min_bedrooms: null
  max_distance_km: null
  must_be_furnished: null
  must_allow_pets: null
  must_have_laundry: null
  must_have_parking: null
  short_term_ok: true

# ─────────────────────────────────────────────
# PREFERENCES (Weighted Scoring)
# ─────────────────────────────────────────────

preferences:
  - name: "Close to UofT"
    enabled: true
    weight: 10
    description: "Prefer listings closer to anchor_address"
    type: "distance"

  - name: "Lower rent"
    enabled: true
    weight: 8
    description: "Prefer listings with lower monthly rent"
    type: "price_asc"

  - name: "Furnished"
    enabled: true
    weight: 6
    description: "Prefer furnished units"
    type: "boolean_field"
    field: "furnished"

  - name: "In-unit laundry"
    enabled: true
    weight: 5
    description: "Prefer in-unit washer/dryer"
    type: "boolean_field"
    field: "laundry_in_unit"

  - name: "Utilities included"
    enabled: true
    weight: 4
    description: "Prefer rent that includes heat/hydro/water"
    type: "boolean_field"
    field: "utilities_included"

  - name: "Parking included"
    enabled: false
    weight: 3
    description: "Prefer listings with parking"
    type: "boolean_field"
    field: "parking_included"

  - name: "Pets allowed"
    enabled: false
    weight: 3
    description: "Prefer pet-friendly listings"
    type: "boolean_field"
    field: "pets_allowed"

  - name: "Balcony or outdoor space"
    enabled: false
    weight: 2
    description: "Prefer units with a balcony, terrace, or yard"
    type: "boolean_field"
    field: "outdoor_space"

  - name: "Gym / fitness center"
    enabled: false
    weight: 2
    description: "Prefer buildings with a gym"
    type: "boolean_field"
    field: "gym"

# ── Output Settings ───────────────────────────
output:
  directory: "./output"
  formats:
    - "html"
    - "json"
    - "csv"
  open_html_on_complete: true
